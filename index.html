<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的主页 | @smilefish674</title>
    <style>
        /* --- 核心审美：深色模式、呼吸感、电影感 --- */
        :root {
            --bg-color: #030303; 
            --card-bg: rgba(20, 20, 20, 0.5); 
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: #cccccc; 
            --accent: #ffffff; 
            --easing: cubic-bezier(0.25, 1, 0.5, 1); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 60px 20px;
            position: relative;
            overflow-x: hidden; 
        }

        /* --- 动态背景容器 --- */
        .background-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            display: flex;
            flex-direction: row; 
        }

        .bg-photo-item {
            flex: 1; 
            position: relative;
            overflow: hidden;
            height: 100%; 
        }

        .bg-photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top; 
            filter: brightness(0.9) contrast(1.05); 
        }

        /* --- 手机端适配：只显示中间照片 --- */
        @media (max-width: 768px) {
            .background-container {
                flex-direction: column;
            }
            .desktop-only {
                display: none; 
            }
            .bg-photo-item.mobile-main {
                width: 100%; 
                height: 100vh; 
                flex: none; 
            }
        }

        /* --- 自上而下的情绪渐变遮罩 --- */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(180deg, rgba(3,3,3,0.05) 0%, rgba(3,3,3,0.2) 60%, rgba(3,3,3,0.9) 85%, rgba(3,3,3,1) 100%);
            z-index: -1;
            pointer-events: none; 
        }

        .main-container {
            width: 100%;
            max-width: 440px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0; 
            animation: fadeInPage 1.2s var(--easing) forwards;
            z-index: 10; 
        }

        /* --- 头像与简介区域 --- */
        .profile-section {
            text-align: center;
            margin-bottom: 45px;
            width: 100%;
        }

        .avatar-wrapper {
            position: relative;
            width: 115px;
            height: 115px;
            margin: 0 auto 24px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 30%; 
            border: 2px solid rgba(255,255,255,0.15); 
            box-shadow: 0 12px 35px rgba(0,0,0,0.9); 
            position: relative;
            z-index: 2;
        }

        .avatar-wrapper::after {
            content: '';
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            border-radius: 50%;
            background: linear-gradient(45deg, rgba(255,255,255,0.1), rgba(255,255,255,0.4), rgba(255,255,255,0.1));
            z-index: 1;
            animation: rotateGlow 5s linear infinite;
            opacity: 0.7;
        }

        .profile-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); 
        }

        .profile-bio {
            font-size: 0.95rem;
            color: var(--text-sub);
            font-weight: 400;
            line-height: 1.6;
            padding: 0 15px;
            text-shadow: 0 1px 5px rgba(0,0,0,0.8);
        }

        /* --- 链接卡片区域 --- */
        .links-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--card-border); 
            padding: 20px 24px;
            border-radius: 18px;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s var(--easing);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .link-card:hover {
            background-color: var(--accent);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: transparent;
        }

        .link-info {
            display: flex;
            align-items: center;
            gap: 18px;
            z-index: 2;
        }

        .icon-box {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            transition: color 0.4s var(--easing);
        }

        .link-card:hover .icon-box svg {
            stroke: #000;
            fill: #000;
        }
        
        .link-card:hover .stroke-only { fill: none !important; }

        .link-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .link-title {
            color: var(--text-main);
            font-weight: 600;
            font-size: 1.05rem;
            transition: color 0.4s var(--easing);
        }

        .link-subtitle {
            color: var(--text-sub);
            font-size: 0.85rem;
            font-weight: 400;
            transition: color 0.4s var(--easing);
        }

        .link-card:hover .link-title,
        .link-card:hover .link-subtitle {
            color: #000000;
        }

        .arrow-icon {
            color: var(--text-sub);
            font-size: 1.2rem;
            transition: transform 0.4s var(--easing), color 0.4s var(--easing);
            z-index: 2;
        }

        .link-card:hover .arrow-icon {
            transform: translateX(5px) rotate(-45deg);
            color: #000;
        }

        /* --- 页脚 --- */
        .footer {
            margin-top: 60px;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
            text-shadow: 0 1px 3px rgba(0,0,0,1);
        }

        /* --- 动画 --- */
        @keyframes fadeInPage {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
